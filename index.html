<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consomatin</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 320px;
        }
        h1 { text-align: center; margin-bottom: 25px; }
        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        .label { font-size: 1.1rem; }
        .count { font-weight: bold; }
        .btn-plus {
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            width: 35px;
            height: 35px;
            cursor: pointer;
            font-size: 1.2rem;
        }
        .actions { margin-top: 25px; display: flex; flex-direction: column; gap: 10px; }
        button.action-btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-reset { background-color: #ef4444; }
        .btn-share { background-color: #4ade80; }
    </style>
</head>
<body>

<div class="container">
    <h1>Consomatin</h1>

    <div class="row">
        <span class="label">Café : <span id="val-cafe" class="count">0</span></span>
        <button class="btn-plus" onclick="ajouter('cafe')">+</button>
    </div>
    <div class="row">
        <span class="label">Chocolat : <span id="val-chocolat" class="count">0</span></span>
        <button class="btn-plus" onclick="ajouter('chocolat')">+</button>
    </div>
    <div class="row">
        <span class="label">Crème : <span id="val-creme" class="count">0</span></span>
        <button class="btn-plus" onclick="ajouter('creme')">+</button>
    </div>
    <div class="row">
        <span class="label">Noisette : <span id="val-noisette" class="count">0</span></span>
        <button class="btn-plus" onclick="ajouter('noisette')">+</button>
    </div>
    <div class="row">
        <span class="label">Jus : <span id="val-jus" class="count">0</span></span>
        <button class="btn-plus" onclick="ajouter('jus')">+</button>
    </div>

    <div class="actions">
        <button class="action-btn btn-reset" onclick="reinitialiser()">Réinitialiser</button>
        <button class="action-btn btn-share" onclick="partager()">Partager le rapport</button>
    </div>
</div>

<script>
    // 1. Charger les données existantes ou créer un objet vide
    let consommations = JSON.parse(localStorage.getItem('statsConso')) || {
        cafe: 0,
        chocolat: 0,
        creme: 0,
        noisette: 0,
        jus: 0
    };

    // 2. Mettre à jour l'interface visuelle
    function updateUI() {
        for (let boisson in consommations) {
            const element = document.getElementById('val-' + boisson);
            if (element) {
                element.innerText = consommations[boisson];
            }
        }
        // Sauvegarder dans la mémoire du navigateur
        localStorage.setItem('statsConso', JSON.stringify(consommations));
    }

    // 3. Ajouter une unité
    function ajouter(boisson) {
        consommations[boisson]++;
        updateUI();
    }

    // 4. Remettre à zéro
    function reinitialiser() {
        if(confirm("Tout remettre à zéro ?")) {
            consommations = { cafe: 0, chocolat: 0, creme: 0, noisette: 0, jus: 0 };
            updateUI();
        }
    }

    // 5. Fonction de partage (basique)
    function partager() {
        const texte = `Rapport Consomatin : 
☕ Café : ${consommations.cafe}
🍫 Chocolat : ${consommations.chocolat}
🥛 Crème : ${consommations.creme}
🌰 Noisette : ${consommations.noisette}
🧃 Jus : ${consommations.jus}`;
        
        if (navigator.share) {
            navigator.share({ title: 'Rapport Consomatin', text: texte });
        } else {
            alert(texte); // Fallback si le navigateur ne supporte pas le partage natif
        }
    }

    // Lancer la mise à jour au chargement
    window.onload = updateUI;
</script>

</body>
</html>
